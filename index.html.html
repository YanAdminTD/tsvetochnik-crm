// ─── UI ATOMS ──────────────────────────────────────────────────────────────
const Avatar=({name,size=36,cls=''})=>{

// ─── CLIENT SEARCH ─────────────────────────────────────────────────────────
const ClientSearch=({selected,setSelected,clients,color='emerald'})=>{
  const [q,setQ]=useState('');const [open,setOpen]=useState(false);const ref=useRef();

  const results=q.length>=2?clients.filter(c=>c.name.toLowerCase().includes(q.toLowerCase())||c.phone.replace(/\D/g,'').includes(q.replace(/\D/g,''))).slice(0,5):[];
  const sel=clients.find(c=>c.id===selected);
  if(sel)return h('div',{className:`flex items-center gap-3 p-3 rounded-xl bg-${color}-50 border border-${color}-200`},

    h('div',{className:'flex-1'},h('div',{className:'text-sm font-medium text-slate-900'},sel.name),h('div',{className:'text-xs text-slate-500'},`${sel.phone} · Баланс: ${fmtBonus(sel.bonus_balance)}`)),

// ─── SIDEBAR ───────────────────────────────────────────────────────────────

// ─── DASHBOARD ─────────────────────────────────────────────────────────────
const Dashboard=({setPage,setSelClient})=>{
  const [data,setData]=useState(null);
  useEffect(()=>{
    Promise.all([
      db.from('clients').select('*').order('total_amount',{ascending:false}),
      db.from('bonus_transactions').select('*').order('created_at',{ascending:false}).limit(50),
      db.from('orders').select('*').order('created_at',{ascending:false}).limit(20),
    ]).then(([cl,tx,or])=>{
      setData({clients:cl.data||[],txns:tx.data||[],orders:or.data||[]});
    });
  },[]);
  if(!data)return h(Spinner);
  const {clients,txns,orders}=data;
  const totalAccrued=txns.filter(t=>t.type==='accrual').reduce((s,t)=>s+t.bonus_amount,0);
  const totalDeducted=txns.filter(t=>t.type==='deduction').reduce((s,t)=>s+t.bonus_amount,0);
  const totalRev=orders.reduce((s,o)=>s+o.amount,0);
  const topClients=clients.slice(0,5);
  const mgrMap={};txns.filter(t=>t.type==='accrual').forEach(t=>{mgrMap[t.manager_name]=mgrMap[t.manager_name]||{n:0,total:0};mgrMap[t.manager_name].n++;mgrMap[t.manager_name].total+=t.order_amount});
  const topMgr=Object.entries(mgrMap).sort((a,b)=>b[1].total-a[1].total).slice(0,4);
  const stats=[
    {label:'Всего клиентов',val:clients.length,sub:`${clients.filter(c=>c.total_orders>0).length} активных`,color:'from-blue-500 to-blue-600',e:'👥'},
    {label:'Начислено бонусов',val:fmtBonus(totalAccrued),sub:`${txns.filter(t=>t.type==='accrual').length} операций`,color:'from-emerald-500 to-emerald-600',e:'⬆️'},
    {label:'Списано бонусов',val:fmtBonus(totalDeducted),sub:`${txns.filter(t=>t.type==='deduction').length} операций`,color:'from-amber-500 to-amber-600',e:'⬇️'},
    {label:'Общая выручка',val:fmtAmt(totalRev),sub:`${orders.length} заказов`,color:'from-violet-500 to-violet-600',e:'💰'},
  ];
  return h('div',{className:'p-6 max-w-7xl mx-auto fade-in'},
    h('div',{className:'mb-8 flex items-center justify-between flex-wrap gap-3'},
      h('div',null,h('h1',{className:'text-2xl font-bold text-slate-900'},'Главная'),h('p',{className:'text-slate-500 text-sm mt-1'},'Обзор системы лояльности')),
      h('div',{className:'flex gap-3'},
        h('button',{onClick:()=>setPage('accrue'),className:'flex items-center gap-2 bg-emerald-500 hover:bg-emerald-600 text-white text-sm font-medium px-4 py-2.5 rounded-xl transition-colors'},h(IconPlus),'Начислить'),
        h('button',{onClick:()=>setPage('deduct'),className:'flex items-center gap-2 bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 text-sm font-medium px-4 py-2.5 rounded-xl transition-colors'},h(IconMinus),'Списать')
      )
    ),
    h('div',{className:'grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8'},
      stats.map((s,i)=>h('div',{key:i,className:'bg-white rounded-2xl border border-slate-100 p-5'},
        h('div',{className:`w-10 h-10 rounded-xl bg-gradient-to-br ${s.color} flex items-center justify-center text-lg mb-3`},s.e),
        h('div',{className:'text-xl font-bold text-slate-900 mb-0.5'},s.val),
        h('div',{className:'text-xs text-slate-500'},s.label),
        h('div',{className:'text-xs text-slate-400 mt-1'},s.sub)
      ))
    ),
    h('div',{className:'grid lg:grid-cols-3 gap-6'},
      h('div',{className:'lg:col-span-2 bg-white rounded-2xl border border-slate-100 p-6'},
        h('div',{className:'flex items-center justify-between mb-5'},
          h('h2',{className:'font-bold text-slate-900'},'Топ клиентов'),
          h('button',{onClick:()=>setPage('clients'),className:'text-xs text-emerald-600 font-medium'},'Все →')
        ),
        h('div',{className:'space-y-2'},
          topClients.map((c,i)=>h('div',{key:c.id,onClick:()=>{setSelClient(c.id);setPage('client')},className:'flex items-center gap-4 p-3 rounded-xl hover:bg-slate-50 cursor-pointer transition-colors'},
            h('div',{className:'w-7 h-7 rounded-full bg-slate-100 flex items-center justify-center text-xs font-bold text-slate-600'},i+1),
            h(Avatar,{name:c.name,size:36}),
            h('div',{className:'flex-1 min-w-0'},h('div',{className:'text-sm font-medium text-slate-900 truncate'},c.name),h('div',{className:'text-xs text-slate-500'},`${c.city} · ${c.total_orders} зак.`)),
            h('div',{className:'text-right'},h('div',{className:'text-sm font-bold text-slate-900'},fmtAmt(c.total_amount)),h(Badge,{status:c.status}))

      h('div',{className:'bg-white rounded-2xl border border-slate-100 p-6'},
        h('h2',{className:'font-bold text-slate-900 mb-5'},'Топ менеджеров'),
        h('div',{className:'space-y-3'},

            h('div',{className:'flex-1 min-w-0'},h('div',{className:'text-sm font-medium text-slate-900 truncate'},name),h('div',{className:'text-xs text-slate-500'},`${d.n} нач.`)),

// ─── CLIENTS PAGE ──────────────────────────────────────────────────────────
const ClientsPage=({setPage,setSelClient})=>{
  const [clients,setClients]=useState(null);
  const [search,setSearch]=useState('');
  const [cityF,setCityF]=useState('');
  const [statusF,setStatusF]=useState('');
  const [showCreate,setShowCreate]=useState(false);
  const [form,setForm]=useState({name:'',phone:'',city:'Алматы',birth_date:''});
  const [saving,setSaving]=useState(false);

  const load=useCallback(async()=>{
    const q=db.from('clients').select('*').order('total_amount',{ascending:false});
    if(cityF)q.eq('city',cityF);
    if(statusF)q.eq('status',statusF);
    const {data}=await q;
    setClients(data||[]);
  },[cityF,statusF]);

  useEffect(()=>{load()},[load]);

  const filtered=clients?clients.filter(c=>!search||c.name.toLowerCase().includes(search.toLowerCase())||c.phone.replace(/\D/g,'').includes(search.replace(/\D/g,''))):[];

  const handleCreate=async()=>{
    if(!form.name||!form.phone)return;
    setSaving(true);
    const {data}=await db.from('clients').insert({...form,birth_date:form.birth_date||null,total_orders:0,total_amount:0,bonus_balance:0,status:'new'}).select().single();
    setSaving(false);
    if(data){setShowCreate(false);setForm({name:'',phone:'',city:'Алматы',birth_date:''});setSelClient(data.id);setPage('client')}
  };

  if(!clients)return h(Spinner);
  return h('div',{className:'p-6 max-w-7xl mx-auto fade-in'},
    h('div',{className:'mb-6 flex items-center justify-between flex-wrap gap-3'},
      h('div',null,h('h1',{className:'text-2xl font-bold text-slate-900'},'Клиенты'),h('p',{className:'text-slate-500 text-sm mt-1'},`${filtered.length} из ${clients.length}`)),
      h('button',{onClick:()=>setShowCreate(true),className:'flex items-center gap-2 bg-emerald-500 hover:bg-emerald-600 text-white text-sm font-medium px-4 py-2.5 rounded-xl'},h(IconPlus),'Создать клиента')
    ),
    h('div',{className:'bg-white rounded-2xl border border-slate-100 p-4 mb-6 flex flex-wrap gap-3'},
      h('div',{className:'flex-1 min-w-[200px] relative'},
        h('span',{className:'absolute left-3 top-1/2 -translate-y-1/2 text-slate-400'},h(IconSearch)),

// ─── ACCRUE ────────────────────────────────────────────────────────────────
const AccruePage=({preClientId,setPage,clients,settings})=>{
  const [cid,setCid]=useState(preClientId||'');
  const [amount,setAmount]=useState('');
  const [city,setCity]=useState('Алматы');
  const [mgr,setMgr]=useState(MANAGERS[0]);
  const [comment,setComment]=useState('');
  const [saving,setSaving]=useState(false);
  const [success,setSuccess]=useState(null);

  const tiers=settings?.cashback_tiers||[{min:0,pct:5},{min:50000,pct:7},{min:100000,pct:10}];
  const c=clients.find(cl=>cl.id===cid);
  const amt=parseFloat(amount)||0;
  const pct=getPct(amt,tiers);
  const bonus=Math.floor(amt*(pct/100));

  const handleSubmit=async()=>{
    if(!cid||amt<=0)return;
    setSaving(true);
    const newBalance=c.bonus_balance+bonus;
    const today=new Date().toISOString().split('T')[0];
    const newOrders=c.total_orders+1;
    const newAmount=c.total_amount+amt;
    const th=settings?.status_thresholds||{regular:3,vip:200000,premium:500000};
    const newStatus=calcStatus(newOrders,newAmount,th);
    await Promise.all([
      db.from('bonus_transactions').insert({client_id:cid,client_name:c.name,type:'accrual',order_amount:amt,bonus_amount:bonus,balance_before:c.bonus_balance,balance_after:newBalance,cashback_percent:pct,manager_name:mgr,city,comment,created_at:today}),
      db.from('orders').insert({client_id:cid,amount:amt,bonus_earned:bonus,bonus_spent:0,manager_name:mgr,city,items:comment||'Заказ',created_at:today}),
      db.from('clients').update({bonus_balance:newBalance,total_orders:newOrders,total_amount:newAmount,status:newStatus}).eq('id',cid),
    ]);
    setSaving(false);
    setSuccess({bonus,pct,clientName:c.name,clientId:cid});
    setAmount('');setComment('');
  };

  if(success)return h('div',{className:'p-6 max-w-2xl mx-auto fade-in'},
    h('div',{className:'bg-white rounded-2xl border border-slate-100 p-8 text-center'},
      h('div',{className:'w-16 h-16 rounded-full bg-emerald-100 flex items-center justify-center mx-auto mb-4 text-emerald-600'},h(IconCheck)),

      h('p',{className:'text-slate-500 mb-1'},'Клиент: ',h('strong',null,success.clientName)),
      h('div',{className:'text-4xl font-bold text-emerald-600 my-4'},`+${fmt(success.bonus)} б`),
      h('p',{className:'text-sm text-slate-500 mb-6'},`Кэшбэк ${success.pct}% от суммы заказа`),
      h('div',{className:'flex gap-3'},
        h('button',{onClick:()=>{setSuccess(null);setCid(preClientId||'')},className:'flex-1 px-4 py-2.5 rounded-xl border border-slate-200 text-sm text-slate-600'},'Ещё начисление'),
        h('button',{onClick:()=>{setPage(preClientId?'client':'clients')},className:'flex-1 px-4 py-2.5 rounded-xl bg-emerald-500 text-white text-sm font-medium'},'Готово')
      )
    )

  return h('div',{className:'p-6 max-w-2xl mx-auto fade-in'},
    h('button',{onClick:()=>setPage(preClientId?'client':'clients'),className:'flex items-center gap-2 text-sm text-slate-500 hover:text-slate-800 mb-6'},h(IconBack),'Назад'),
    h('div',{className:'mb-6'},h('h1',{className:'text-2xl font-bold text-slate-900'},'Начислить бонусы'),h('p',{className:'text-slate-500 text-sm mt-1'},'Кэшбэк 5% / 7% / 10% в зависимости от суммы')),
    h('div',{className:'bg-white rounded-2xl border border-slate-100 p-6 space-y-5'},
      h('div',null,h('label',{className:'block text-sm font-medium text-slate-700 mb-1.5'},'Клиент *'),h(ClientSearch,{selected:cid,setSelected:setCid,clients})),
      h(Input,{label:'Сумма заказа *',value:amount,onChange:e=>setAmount(e.target.value),type:'number',placeholder:'0',suffix:'₸'}),
      amt>0&&h('div',{className:'bg-emerald-50 rounded-xl p-4 border border-emerald-100 flex items-center justify-between'},

      h('button',{onClick:handleSubmit,disabled:!cid||amt<=0||deductVal<=0||saving,className:'w-full py-3 rounded-xl bg-amber-500 hover:bg-amber-600 text-white font-medium disabled:opacity-50 flex items-center justify-center gap-2'},
        saving?h(IconRefresh):h(IconMinus),saving?'Списание...':'Списать '+(deductVal>0?fmt(deductVal)+' бонусов':''))
    )
  );
};

    h('div',{className:'grid lg:grid-cols-3 gap-6 mb-6'},

// ─── SETTINGS ─────────────────────────────────────────────────────────────
const SettingsPage=()=>{
  const [settings,setSettings]=useState(null);
  const [saved,setSaved]=useState(false);
  useEffect(()=>{db.from('settings').select('*').single().then(({data})=>{if(data)setSettings(data)});},[]);
  if(!settings)return h(Spinner);
  const tiers=settings.cashback_tiers||[];
  const th=settings.status_thresholds||{};
  const save=async()=>{
    await db.from('settings').update({cashback_tiers:settings.cashback_tiers,max_bonus_percent:settings.max_bonus_percent,status_thresholds:settings.status_thresholds}).eq('id',1);
    setSaved(true);setTimeout(()=>setSaved(false),2000);
  };
  return h('div',{className:'p-6 max-w-3xl mx-auto fade-in'},
    h('div',{className:'mb-6'},h('h1',{className:'text-2xl font-bold text-slate-900'},'Настройки'),h('p',{className:'text-slate-500 text-sm mt-1'},'Параметры системы лояльности')),
    h('div',{className:'space-y-5'},
      h('div',{className:'bg-white rounded-2xl border border-slate-100 p-6'},
        h('h2',{className:'font-bold text-slate-900 mb-4'},'Уровни кэшбэка'),
        h('div',{className:'space-y-3'},tiers.map((tier,i)=>h('div',{key:i,className:'flex items-center gap-4 p-4 rounded-xl bg-slate-50'},
          h('div',{className:'flex-1 text-sm text-slate-600'},i===0?'Базовая ставка':`От ${fmt(tier.min)} ₸`),
          h('div',{className:'flex items-center gap-2'},
            h('span',{className:'text-sm text-slate-600'},'Кэшбэк:'),
            h('input',{type:'number',value:tier.pct,onChange:e=>{const t=[...tiers];t[i]={...tier,pct:parseInt(e.target.value)||0};setSettings({...settings,cashback_tiers:t})},className:'w-20 px-3 py-1.5 rounded-lg border border-slate-200 text-sm text-center font-bold text-emerald-600 focus:outline-none focus:ring-2 focus:ring-emerald-400'}),
            h('span',{className:'text-sm text-slate-600'},'%')
          )
        )))
      ),
      h('div',{className:'bg-white rounded-2xl border border-slate-100 p-6'},
        h('h2',{className:'font-bold text-slate-900 mb-2'},'Лимит списания бонусов'),
        h('p',{className:'text-sm text-slate-500 mb-4'},'Максимум % от суммы заказа'),
        h('div',{className:'flex items-center gap-3'},
          h('input',{type:'number',value:settings.max_bonus_percent,onChange:e=>setSettings({...settings,max_bonus_percent:parseInt(e.target.value)||0}),className:'w-24 px-4 py-2.5 rounded-xl border border-slate-200 text-2xl font-bold text-amber-600 text-center focus:outline-none focus:ring-2 focus:ring-emerald-400'}),
          h('span',{className:'text-xl text-slate-600'},'%')
        )
      ),
      h('div',{className:'bg-white rounded-2xl border border-slate-100 p-6'},
        h('h2',{className:'font-bold text-slate-900 mb-4'},'Пороги статусов'),
        h('div',{className:'space-y-3'},
          [{key:'regular',label:'Постоянный',icon:'🔵',desc:'заказов',isAmt:false},{key:'vip',label:'VIP',icon:'⭐',desc:'₸',isAmt:true},{key:'premium',label:'Premium',icon:'💎',desc:'₸',isAmt:true}].map(item=>
            h('div',{key:item.key,className:'flex items-center gap-4 p-4 rounded-xl bg-slate-50'},
              h('span',{className:'text-2xl'},item.icon),
              h('div',{className:'flex-1'},h('div',{className:'text-sm font-medium text-slate-900'},item.label)),
              h('div',{className:'flex items-center gap-2'},
                h('input',{type:'number',value:th[item.key]||0,onChange:e=>setSettings({...settings,status_thresholds:{...th,[item.key]:parseInt(e.target.value)||0}}),className:'w-32 px-3 py-2 rounded-xl border border-slate-200 text-sm text-right font-bold focus:outline-none focus:ring-2 focus:ring-emerald-400'}),
                h('span',{className:'text-sm text-slate-500'},item.desc)
              )
            )
          )
        )
      ),
      h('button',{onClick:save,className:`flex items-center gap-2 px-6 py-2.5 rounded-xl text-sm font-medium transition-colors ${saved?'bg-emerald-100 text-emerald-700':'bg-emerald-500 hover:bg-emerald-600 text-white'}`},saved?'✓ Сохранено!':'Сохранить настройки')
    )
  );
};

// ─── APP ───────────────────────────────────────────────────────────────────
function App(){
  const [page,setPage]=useState('dashboard');
  const [selClient,setSelClient]=useState('');
  const [clients,setClients]=useState([]);
  const [settings,setSettings]=useState(null);

  useEffect(()=>{
    db.from('clients').select('*').order('name').then(({data})=>setClients(data||[]));
    db.from('settings').select('*').single().then(({data})=>setSettings(data));
  },[]);

  // reload clients after operations
  const reloadClients=()=>db.from('clients').select('*').order('name').then(({data})=>setClients(data||[]));

  const navigate=(p,cid)=>{
    if(cid)setSelClient(cid);
    setPage(p);
    window.scrollTo(0,0);
    if(['dashboard','clients','analytics'].includes(p))reloadClients();
  };

  const renderPage=()=>{
    switch(page){
      case 'dashboard':return h(Dashboard,{setPage:navigate,setSelClient});
      case 'clients':return h(ClientsPage,{setPage:navigate,setSelClient});
      case 'client':return h(ClientDetail,{clientId:selClient,setPage:navigate,setSelClient});
      case 'accrue':return h(AccruePage,{preClientId:selClient,setPage:navigate,clients,settings});
      case 'deduct':return h(DeductPage,{preClientId:selClient,setPage:navigate,clients,settings});
      case 'analytics':return h(AnalyticsPage);
      case 'settings':return h(SettingsPage);
      default:return null;
    }
  };

  return h('div',{className:'flex min-h-screen bg-slate-50'},
    h(Sidebar,{page,setPage:navigate}),
    h('main',{className:'flex-1 overflow-auto'},renderPage())
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
